name: cureocity-mind

services:
  postgres:
    image: postgres:16-alpine
    container_name: cureocity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cureocity
      POSTGRES_PASSWORD: cureocity
      POSTGRES_DB: cureocity_mind
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cureocity -d cureocity_mind']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cureocity-mind

  redis:
    image: redis:7-alpine
    container_name: cureocity-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cureocity-mind

  kafka:
    image: apache/kafka:3.7.1
    container_name: cureocity-kafka
    restart: unless-stopped
    ports:
      - '29092:29092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - cureocity-mind

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: cureocity-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: cureocity
      MINIO_ROOT_PASSWORD: cureocity-dev-secret
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mc alias set hc http://127.0.0.1:9000 cureocity cureocity-dev-secret >/dev/null 2>&1 && mc ready hc >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - cureocity-mind

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: cureocity-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cureocity-mind
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 cureocity cureocity-dev-secret &&
      mc mb --ignore-existing local/cureocity-mind-audio &&
      mc mb --ignore-existing local/cureocity-mind-pdfs &&
      echo 'MinIO buckets initialized'
      "
    restart: 'no'

  # ----- Observability stack — Sprint 10 PR 2 ---------------------------
  # OTLP collector for traces. Services emit OTLP/HTTP on :4318 and the
  # collector dumps to stdout in dev. Metrics flow direct from each
  # service to Prometheus (see below) — collector is trace-only in V1.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    container_name: cureocity-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otel-collector/config.yaml']
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP (what services target)
      - '8889:8889' # Collector-exported Prometheus metrics
    networks:
      - cureocity-mind

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: cureocity-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    extra_hosts:
      # Lets Prometheus scrape services running on the host machine
      # (the dev workflow runs services via `pnpm` outside Docker).
      - 'host.docker.internal:host-gateway'
    depends_on:
      - otel-collector
    networks:
      - cureocity-mind

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: cureocity-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Viewer'
      GF_USERS_DEFAULT_THEME: 'dark'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3030:3000' # Avoid the 3000-3006 service range
    depends_on:
      - prometheus
    networks:
      - cureocity-mind

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  cureocity-mind:
    name: cureocity-mind
    driver: bridge
