# OpenTelemetry Collector config — Sprint 10 PR 2.
#
# Receives traces over OTLP/HTTP on :4318 (where every service points
# via OTEL_EXPORTER_OTLP_ENDPOINT in infrastructure/.env). Exports
# traces in OTLP and exposes its own Prometheus scrape endpoint for
# self-observability.
#
# Metrics are scraped directly by Prometheus from each service's
# Prometheus exporter port (4001-4006) — see prometheus.yml. The
# collector is only used for traces in V1 to keep the data plane
# simple. Sprint 11+ can route metrics through here if the operations
# team wants a single pipeline.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 256
  # Drop traces for the /metrics and /health scrape paths — they just
  # generate noise.
  filter/drop_scrapes:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/metrics"'
        - 'attributes["http.target"] == "/api/v1/health"'

exporters:
  # No real backend wired in V1; the collector logs to stdout so a
  # developer can see traces flowing during local dev. Sprint 11 wires
  # an OTLP exporter to a real backend (Tempo or Honeycomb).
  debug:
    verbosity: basic
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  telemetry:
    logs:
      level: warn
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/drop_scrapes, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
